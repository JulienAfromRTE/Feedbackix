{% extends "base.html" %}
{% block extra_head %}
<link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
{% endblock %}

{% block content %}

<div class="breadcrumb">
    <a href="{{ url_for('app_detail', slug=app.slug) }}">{{ app.icon }} {{ app.name }}</a>
    <span class="bc-sep">›</span>
    <span>Nouveau feedback</span>
</div>

<div class="card">
    <h2>💬 Nouveau feedback</h2>

    <form method="post" id="feedbackForm">

        <label>Titre du feedback *</label>
        <input type="text" name="title" placeholder="Décrivez brièvement votre remarque..." required>

        <div class="form-row-3">
            <div>
                <label>Catégorie</label>
                <select name="category_id">
                    <option value="">— Aucune —</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label>Priorité</label>
                <select name="priority">
                    <option value="basse">🟢 Basse</option>
                    <option value="normale" selected>🔵 Normale</option>
                    <option value="haute">🟡 Haute</option>
                    <option value="critique">🔴 Critique</option>
                </select>
            </div>
            {% if versions %}
            <div>
                <label>Version cible (optionnel)</label>
                <select name="version_id">
                    <option value="">— Aucune version —</option>
                    {% for v in versions %}
                    <option value="{{ v.id }}">{{ v.version_name }}{% if v.release_date %} ({{ v.release_date }}){% endif %}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}
        </div>

        <label>Description détaillée</label>
        <div id="quillEditor"></div>
        <input type="hidden" name="content_html" id="contentHtml">

        <div class="form-divider"></div>

        <div class="anon-toggle">
            <label class="toggle-label">
                <input type="checkbox" name="is_anonymous" id="isAnonymous">
                <span class="toggle-text">Soumettre de façon <strong>anonyme</strong></span>
            </label>
        </div>

        <div id="authorSection">
            <div class="form-row-2">
                <div>
                    <label>Votre nom *</label>
                    <input type="text" name="author_name" id="authorName" placeholder="Prénom Nom">
                </div>
                <div>
                    <label>Votre service *</label>
                    <input type="text" name="author_service" id="authorService" placeholder="Ex : DSIT, Comptabilité, RH...">
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">✉️ Soumettre le feedback</button>
            <a href="{{ url_for('app_detail', slug=app.slug) }}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</div>

{% endblock %}

{% block extra_scripts %}
<script>
var quill = new Quill('#quillEditor', {
    theme: 'snow',
    placeholder: 'Décrivez votre feedback en détail. Vous pouvez mettre en forme le texte et insérer des images...',
    modules: {
        toolbar: {
            container: [
                ['bold', 'italic', 'underline', 'strike'],
                ['blockquote', 'code-block'],
                [{'list': 'ordered'}, {'list': 'bullet'}],
                [{'color': []}, {'background': []}],
                ['link', 'image'],
                ['clean']
            ],
            handlers: { image: quillImageHandler }
        }
    }
});

function quillImageHandler() {
    var input = document.createElement('input');
    input.setAttribute('type', 'file');
    input.setAttribute('accept', 'image/*');
    input.click();
    input.onchange = function() {
        var file = input.files[0];
        if (!file) return;
        var fd = new FormData();
        fd.append('image', file);
        fetch('upload-image', { method: 'POST', body: fd })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.url) {
                    var range = quill.getSelection() || {index: 0};
                    quill.insertEmbed(range.index, 'image', d.url);
                }
            });
    };
}

document.getElementById('feedbackForm').addEventListener('submit', function() {
    document.getElementById('contentHtml').value = quill.root.innerHTML;
});

document.getElementById('isAnonymous').addEventListener('change', function() {
    var isAnon = this.checked;
    document.getElementById('authorSection').style.display = isAnon ? 'none' : 'block';
    document.getElementById('authorName').required = !isAnon;
    document.getElementById('authorService').required = !isAnon;
});
</script>
{% endblock %}
